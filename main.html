<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VigilanteWatch — Cigilante Bounty Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
:root {
  --bg: #0d0c10;
  --card: rgba(22, 20, 28, 0.98);
  --border: #2d2a36;
  --text: #e0dce8;
  --muted: #8884a0;
  --accent: #a78bfa;
  --accent-dim: #7c3aed;
  --gradient: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
  --radius: 12px;
  --font-mono: 'JetBrains Mono', monospace;
  --font-body: 'Outfit', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; }
body {
  margin: 0;
  font-family: var(--font-body);
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 70% 50% at 50% -15%, rgba(167, 139, 250, 0.08), transparent),
    radial-gradient(ellipse 50% 30% at 90% 50%, rgba(45, 42, 54, 0.5), transparent);
  min-height: 100vh;
  color: var(--text);
  line-height: 1.55;
}
.app { max-width: 680px; margin: 0 auto; padding: 2rem 1.25rem; min-height: 100vh; display: flex; flex-direction: column; }
header { text-align: center; margin-bottom: 2rem; }
h1 { font-size: 2rem; font-weight: 700; margin: 0 0 0.35rem 0; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.tagline { color: var(--muted); font-size: 0.95rem; margin: 0 0 1rem 0; }
.hero { color: var(--muted); font-size: 0.9rem; line-height: 1.6; max-width: 540px; margin: 0 auto; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
.card h2 { font-size: 1.05rem; color: var(--accent); margin: 0 0 0.85rem 0; font-weight: 600; }
label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--muted); margin-bottom: 0.4rem; }
textarea { width: 100%; min-height: 100px; padding: 0.85rem 1rem; border: 1px solid var(--border); border-radius: 8px; background: rgba(13, 12, 16, 0.6); color: var(--text); font-family: var(--font-mono); font-size: 0.9rem; resize: vertical; }
textarea::placeholder { color: var(--muted); }
textarea:focus { outline: none; border-color: var(--accent); }
input[type="number"] { width: 140px; padding: 0.5rem 0.75rem; border: 1px solid var(--border); border-radius: 8px; background: rgba(13, 12, 16, 0.6); color: var(--text); font-family: var(--font-mono); margin-right: 0.5rem; margin-bottom: 0.5rem; }
.actions { display: flex; align-items: center; flex-wrap: wrap; gap: 0.75rem; margin-top: 0.75rem; }
.btn { padding: 0.6rem 1.35rem; background: var(--gradient); border: none; border-radius: 8px; color: #fff; font-weight: 600; font-size: 0.95rem; cursor: pointer; font-family: inherit; transition: filter 0.2s, transform 0.1s; }
.btn:hover { filter: brightness(1.1); }
.btn:active { transform: scale(0.98); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.report-list { margin: 0.5rem 0; }
.report-item { padding: 0.65rem 0.9rem; margin-bottom: 0.5rem; background: rgba(0,0,0,0.25); border-radius: 8px; border: 1px solid var(--border); font-size: 0.9rem; }
.report-item .id { font-family: var(--font-mono); color: var(--accent); font-size: 0.8rem; }
.report-item .body { color: var(--text); margin: 0.35rem 0; }
.report-item .meta { color: var(--muted); font-size: 0.8rem; }
.report-item .claimed { color: #86efac; }
.stats pre { font-family: var(--font-mono); font-size: 0.85rem; color: var(--muted); margin: 0; }
.error { color: #f87171; font-size: 0.9rem; margin-top: 0.5rem; }
.hidden { display: none; }
.section-title { font-size: 1rem; font-weight: 700; color: var(--text); margin: 0 0 0.75rem 0; }
.how-list { margin: 0; padding-left: 1.2rem; color: var(--muted); font-size: 0.9rem; line-height: 1.7; }
.how-list li { margin-bottom: 0.5rem; }
.faq dl { margin: 0; }
.faq dt { font-weight: 600; color: var(--text); font-size: 0.95rem; margin-top: 1rem; margin-bottom: 0.3rem; }
.faq dd { margin: 0; color: var(--muted); font-size: 0.88rem; line-height: 1.6; }
.faq code { background: rgba(45, 42, 54, 0.8); padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.82em; }
footer { text-align: center; margin-top: auto; padding-top: 2rem; color: var(--muted); font-size: 0.8rem; }
footer p { margin: 0 0 0.25rem 0; }
.events-list { font-family: var(--font-mono); font-size: 0.8rem; color: var(--muted); max-height: 200px; overflow-y: auto; }
.events-list div { padding: 0.25rem 0; border-bottom: 1px solid var(--border); }
@media (max-width: 480px) { .app { padding: 1.25rem 1rem; } h1 { font-size: 1.65rem; } }
.code-block { font-family: var(--font-mono); font-size: 0.8rem; background: rgba(0,0,0,0.3); padding: 0.75rem; border-radius: 6px; overflow-x: auto; margin: 0.5rem 0; }
.glossary-list { list-style: none; padding: 0; margin: 0; }
.glossary-list li { margin-bottom: 0.75rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
.glossary-list strong { color: var(--accent); }
.api-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.api-table th, .api-table td { text-align: left; padding: 0.4rem 0.6rem; border: 1px solid var(--border); }
.api-table th { color: var(--accent); }
.api-table td { color: var(--muted); }
/* Utility spacing */
.mt-1 { margin-top: 0.5rem; }
.mt-2 { margin-top: 1rem; }
.mt-3 { margin-top: 1.5rem; }
.mb-1 { margin-bottom: 0.5rem; }
.mb-2 { margin-bottom: 1rem; }
.mb-3 { margin-bottom: 1.5rem; }
.ml-1 { margin-left: 0.5rem; }
.mr-1 { margin-right: 0.5rem; }
.p-1 { padding: 0.5rem; }
.p-2 { padding: 1rem; }
/* Typography utilities */
.text-muted { color: var(--muted); }
.text-small { font-size: 0.85rem; }
.text-tiny { font-size: 0.75rem; }
.font-mono { font-family: var(--font-mono); }
.font-bold { font-weight: 700; }
/* Focus and accessibility */
.btn:focus-visible, textarea:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
/* Loading state */
.loading { opacity: 0.7; pointer-events: none; }
/* Animations */
